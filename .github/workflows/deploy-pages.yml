name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_ENV: public-beta
      PUBLIC_SITE_URL: https://chengjt23.github.io
      PUBLIC_BASE_PATH: /Blog
      PUBLIC_ALLOW_INDEXING: 'false'
      PUBLIC_BETA_APPROVED: 'true'
      PUBLIC_SITE_NAME: 研究笔记
      PUBLIC_AUTHOR_NAME: chengjt23
      PUBLIC_SITE_DESCRIPTION: 生成建模、随机过程与最优传输的系统教程与研究笔记。
      PUBLIC_CONTENT_LICENSE: all-rights-reserved
      PUBLIC_GITHUB_URL: https://github.com/chengjt23
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static checks
        run: |
          npm run format:check
          npm run check
          npm run lint
          npm test

      - name: Build Pages artifact
        run: npm run build

      - name: Install Chrome
        run: npx playwright install --with-deps chrome

      - name: Run browser tests
        run: npm run test:e2e

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
